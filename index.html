<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Asteder - Gudenå Podcast Map</title>

    <!-- ArcGIS Maps SDK -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.28/"></script>

    <!-- Typography (shared with DravaBike) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        /* ========================================
           CSS VARIABLES & RESET
           Shared design system with DravaBike
           ======================================== */
        :root {
            --color-forest: #1B3A2D;
            --color-forest-light: #2C5F41;
            --color-sage: #7A9E7E;
            --color-sage-light: #B5CDB6;
            --color-sand: #F4EDE4;
            --color-sand-dark: #E8DFD3;
            --color-earth: #8B7355;
            --color-earth-light: #C4A882;
            --color-water: #4A7F9E;
            --color-water-light: #A8D0E6;
            --color-text: #2D2A26;
            --color-text-secondary: #6B6560;
            --color-white: #FEFDFB;
            --color-accent: #C85A3A;
            --color-accent-light: #F0D4C8;
            --font-display: 'DM Serif Display', Georgia, serif;
            --font-body: 'Source Sans 3', -apple-system, sans-serif;
            --header-height: 64px;
            --sidebar-width: 280px;
            --player-height-compact: 72px;
            --player-height-expanded: 310px;
            --radius-sm: 6px;
            --radius-md: 12px;
            --radius-lg: 20px;
            --shadow-sm: 0 1px 3px rgba(27,58,45,0.08);
            --shadow-md: 0 4px 16px rgba(27,58,45,0.12);
            --shadow-lg: 0 8px 32px rgba(27,58,45,0.16);
            --shadow-up: 0 -4px 20px rgba(27,58,45,0.12);
            --transition-fast: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--color-sand);
            color: var(--color-text);
            -webkit-font-smoothing: antialiased;
        }

        /* ========================================
           HEADER
           ======================================== */
        #header {
            height: var(--header-height);
            background: var(--color-forest);
            color: var(--color-white);
            display: flex;
            align-items: center;
            padding: 0 24px;
            position: relative;
            z-index: 1000;
            flex-shrink: 0;
        }

        #header::after {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            pointer-events: none;
        }

        .header-content {
            display: flex;
            align-items: center;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            flex-shrink: 0;
            overflow: hidden;
        }

        .header-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #headerProgram {
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            opacity: 0.6;
            margin-bottom: 1px;
        }

        #headerTitle {
            font-family: var(--font-display);
            font-size: 22px;
            font-weight: 400;
            letter-spacing: 0.02em;
            line-height: 1.2;
        }

        #headerSubtitle {
            font-size: 12px;
            font-weight: 300;
            opacity: 0.7;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Language selector */
        .language-selector {
            position: absolute;
            right: 24px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 6px;
            z-index: 1;
        }

        .lang-flag {
            width: 32px;
            height: 22px;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            opacity: 0.5;
            transition: var(--transition-fast);
            object-fit: cover;
        }

        .lang-flag:hover { opacity: 0.8; transform: scale(1.05); }
        .lang-flag.active { border-color: var(--color-sage-light); opacity: 1; }

        /* ========================================
           MAIN LAYOUT
           ======================================== */
        #mainContent {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ========================================
           SIDEBAR (LEFT)
           ======================================== */
        #sidebar {
            width: var(--sidebar-width);
            background: var(--color-white);
            border-right: 1px solid var(--color-sand-dark);
            display: flex;
            flex-direction: column;
            z-index: 900;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 16px 20px;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--color-text-secondary);
            border-bottom: 1px solid var(--color-sand-dark);
        }

        #episodeList {
            flex: 1;
            overflow-y: auto;
            padding: 4px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--color-sand-dark) transparent;
        }

        #episodeList::-webkit-scrollbar { width: 5px; }
        #episodeList::-webkit-scrollbar-track { background: transparent; }
        #episodeList::-webkit-scrollbar-thumb { background: var(--color-sand-dark); border-radius: 3px; }

        .episode-item {
            padding: 12px 20px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: var(--transition-fast);
            position: relative;
        }

        .episode-item:hover {
            background: var(--color-sand);
            border-left-color: var(--color-sage-light);
        }

        .episode-item.active {
            background: var(--color-sand);
            border-left-color: var(--color-accent);
        }

        .episode-number {
            display: block;
            font-size: 9px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--color-sage);
            margin-bottom: 3px;
        }

        .episode-item.active .episode-number {
            color: var(--color-accent);
        }

        .episode-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--color-text);
            line-height: 1.4;
        }

        .episode-item.active .episode-name {
            color: var(--color-forest);
            font-weight: 600;
        }

        /* Now-playing indicator */
        .episode-item.active::after {
            content: '';
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 8px;
            height: 8px;
            background: var(--color-accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: translateY(-50%) scale(1); }
            50% { opacity: 0.5; transform: translateY(-50%) scale(0.7); }
        }

        /* Navigation buttons */
        .nav-buttons {
            padding: 12px 16px;
            border-top: 1px solid var(--color-sand-dark);
            display: flex;
            gap: 8px;
            background: var(--color-white);
        }

        .nav-btn {
            flex: 1;
            padding: 10px 12px;
            background: var(--color-forest);
            color: var(--color-white);
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-family: var(--font-body);
            font-size: 12px;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .nav-btn:hover:not(:disabled) { background: var(--color-forest-light); }
        .nav-btn:active:not(:disabled) { transform: scale(0.97); }
        .nav-btn:disabled { background: var(--color-sand-dark); color: var(--color-text-secondary); cursor: not-allowed; }
        .nav-btn svg { width: 14px; height: 14px; flex-shrink: 0; }

        /* ========================================
           MAP (CENTER)
           ======================================== */
        #viewDiv {
            flex: 1;
            position: relative;
        }

        /* Loading overlay */
        #loading {
            position: absolute;
            inset: 0;
            background: var(--color-sand);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            z-index: 10000;
            transition: opacity 0.6s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--color-sand-dark);
            border-top-color: var(--color-forest);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        #loadingText {
            font-size: 13px;
            font-weight: 400;
            color: var(--color-text-secondary);
            letter-spacing: 0.02em;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========================================
           SIDEBAR ADAPTS TO PLAYER
           When player is visible, sidebar shrinks to avoid overlap
           ======================================== */
        body.player-open #sidebar {
            padding-bottom: var(--player-height-compact);
            transition: padding-bottom var(--transition-smooth);
        }

        body.player-expanded #sidebar {
            padding-bottom: var(--player-height-expanded);
        }

        /* ========================================
           AUDIO PLAYER PANEL (BOTTOM)
           ======================================== */
        #audioPanel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--color-white);
            border-top: 1px solid var(--color-sand-dark);
            box-shadow: var(--shadow-up);
            z-index: 990;
            transform: translateY(100%);
            transition: transform var(--transition-smooth);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #audioPanel.visible {
            transform: translateY(0);
        }

        /* Compact bar — always visible when panel is open */
        .player-bar {
            display: flex;
            align-items: center;
            padding: 0 16px;
            height: var(--player-height-compact);
            cursor: pointer;
            flex-shrink: 0;
            gap: 14px;
            transition: background var(--transition-fast);
        }

        .player-bar:hover { background: var(--color-sand); }

        .player-icon {
            width: 44px;
            height: 44px;
            background: var(--color-accent);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: white;
            font-size: 20px;
        }

        .player-info {
            flex: 1;
            min-width: 0;
        }

        #episodeTitle {
            font-family: var(--font-display);
            font-size: 15px;
            font-weight: 400;
            color: var(--color-forest);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
        }

        #episodeDownloads {
            font-size: 11px;
            color: var(--color-text-secondary);
            display: block;
            margin-top: 2px;
        }

        .player-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .expand-btn, .close-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--color-sand-dark);
            background: var(--color-white);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            color: var(--color-text-secondary);
        }

        .expand-btn:hover, .close-btn:hover {
            background: var(--color-sand);
            border-color: var(--color-sage-light);
        }

        .close-btn:hover { color: var(--color-accent); }

        .expand-btn svg, .close-btn svg {
            width: 16px;
            height: 16px;
            transition: transform var(--transition-fast);
        }

        #audioPanel.expanded .expand-btn svg {
            transform: rotate(180deg);
        }

        /* Expanded area — iframe container */
        .player-embed {
            overflow: hidden;
            transition: height var(--transition-smooth);
            height: 0;
        }

        #audioPanel.expanded .player-embed {
            height: 190px;
        }

        #playerContainer {
            padding: 0 16px 12px;
            height: 100%;
        }

        #playerContainer iframe {
            border-radius: var(--radius-sm);
        }

        /* Episode nav in player */
        .player-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px 10px;
            opacity: 0;
            height: 0;
            overflow: hidden;
            transition: opacity var(--transition-fast), height var(--transition-fast);
        }

        #audioPanel.expanded .player-nav {
            opacity: 1;
            height: 40px;
        }

        .player-counter {
            font-size: 11px;
            font-weight: 500;
            color: var(--color-text-secondary);
            letter-spacing: 0.04em;
        }

        .player-nav-btns {
            display: flex;
            gap: 6px;
        }

        .player-nav-btn {
            width: 32px;
            height: 32px;
            border: 1px solid var(--color-sand-dark);
            background: var(--color-white);
            border-radius: var(--radius-sm);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
            color: var(--color-text);
        }

        .player-nav-btn:hover:not(:disabled) {
            background: var(--color-sand);
            border-color: var(--color-sage-light);
        }

        .player-nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .player-nav-btn svg { width: 16px; height: 16px; }

        /* ========================================
           MOBILE MENU TOGGLE
           ======================================== */
        #menuToggle {
            display: none;
            position: fixed;
            z-index: 1001;
            background: var(--color-white);
            border: none;
            width: 44px;
            height: 44px;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
            cursor: pointer;
            font-size: 20px;
            align-items: center;
            justify-content: center;
            color: var(--color-forest);
            transition: var(--transition-fast);
        }

        #menuToggle:active { transform: scale(0.93); }

        /* Sidebar overlay */
        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            top: var(--header-height);
            background: rgba(0,0,0,0.3);
            z-index: 895;
        }

        .sidebar-overlay.visible { display: block; }

        /* ========================================
           RESPONSIVE — TABLET (≤1024px)
           ======================================== */
        @media (max-width: 1024px) {
            :root {
                --sidebar-width: 260px;
            }

            #sidebar {
                position: fixed;
                left: calc(-1 * var(--sidebar-width));
                top: var(--header-height);
                bottom: 0;
                transition: left var(--transition-smooth);
                box-shadow: var(--shadow-lg);
                z-index: 960;
            }

            #sidebar.open { left: 0; }

            #menuToggle {
                display: flex;
                top: calc(var(--header-height) + 12px);
                left: 12px;
            }
        }

        /* ========================================
           RESPONSIVE — MOBILE (≤768px)
           ======================================== */
        @media (max-width: 768px) {
            :root {
                --header-height: 56px;
                --player-height-compact: 64px;
            }

            #headerTitle { font-size: 18px; }
            #headerSubtitle { font-size: 10px; }
            #headerProgram { font-size: 8px; }

            .language-selector { right: 14px; gap: 5px; }
            .lang-flag { width: 26px; height: 18px; }

            .header-logo { width: 32px; height: 32px; }

            #menuToggle {
                top: calc(var(--header-height) + 10px);
                left: 10px;
                width: 40px;
                height: 40px;
                font-size: 18px;
            }

            /* Player adjustments */
            .player-bar { padding: 0 12px; gap: 10px; }
            .player-icon { width: 38px; height: 38px; border-radius: var(--radius-sm); font-size: 17px; }
            #episodeTitle { font-size: 13px; }

            #audioPanel.expanded .player-embed { height: 170px; }
            #playerContainer { padding: 0 12px 8px; }

            /* Sidebar — hidden by default on mobile, slides up above player */
            #sidebar {
                position: fixed;
                left: 0;
                right: 0;
                bottom: 0;
                top: auto;
                width: 100%;
                height: 45dvh;
                max-height: 45dvh;
                transform: translateY(100%);
                transition: transform var(--transition-smooth);
                border-right: none;
                border-top: 1px solid var(--color-sand-dark);
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                box-shadow: 0 -4px 24px rgba(0,0,0,0.15);
                z-index: 995;
            }

            #sidebar.open {
                transform: translateY(0);
            }

            /* When player is open, sidebar sits above it */
            body.player-open #sidebar {
                bottom: var(--player-height-compact);
            }

            body.player-expanded #sidebar {
                bottom: var(--player-height-expanded);
            }

            /* Show a drag-handle style header on mobile sidebar */
            .sidebar-header {
                text-align: center;
                position: relative;
            }

            .sidebar-header::before {
                content: '';
                display: block;
                width: 36px;
                height: 4px;
                background: var(--color-sand-dark);
                border-radius: 2px;
                margin: 0 auto 10px;
            }

            #sidebar .nav-buttons { display: none; }
        }

        /* Desktop: hide overlay and mobile-only elements */
        @media (min-width: 1025px) {
            .sidebar-overlay { display: none !important; }
            .list-btn { display: none; }
        }

        @media (min-width: 769px) {
            .list-btn { display: none; }
        }

        /* ========================================
           ANIMATIONS
           ======================================== */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========================================
           ARCGIS WIDGET OVERRIDES
           ======================================== */
        .esri-ui-corner { margin: 12px; }
        .esri-widget--button { border-radius: var(--radius-sm) !important; }
        .esri-expand__mask { background: rgba(0,0,0,0.25); }
    </style>
</head>

    <!-- Mobile menu toggle -->

    <!-- Sidebar overlay -->

    <!-- Main layout -->
    <div id="mainContent">
        <!-- Sidebar — LEFT -->
        <nav id="sidebar">
            <div class="sidebar-header" id="sidebarHeader">Episodes</div>
            <div id="episodeList"></div>
            <div class="nav-buttons">
                <button class="nav-btn" id="prevBtn" onclick="navigatePrevious()" disabled>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>

                </button>
            </div>

        <!-- Map — CENTER -->
        <div id="viewDiv">
            <div id="loading">

    <!-- Audio Player Panel — BOTTOM -->
    <div id="audioPanel">
        <!-- Compact bar (always visible when panel shown) -->
        <div class="player-bar" onclick="togglePlayerExpand()">
            <div class="player-icon">▶</div>
            <div class="player-info">
                <span id="episodeTitle">Episode Title</span>
                <span id="episodeDownloads"></span>
            </div>
            <div class="player-actions" onclick="event.stopPropagation()">
                <button class="expand-btn list-btn" onclick="toggleSidebar()" aria-label="Episode list" title="Episodes">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/></svg>
                </button>
                <button class="expand-btn" onclick="togglePlayerExpand()" aria-label="Expand player" title="Expand">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
                </button>
                <button class="close-btn" onclick="closePlayer()" aria-label="Close player" title="Close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>

        <!-- Episode nav (visible when expanded) -->
        <div class="player-nav">
            <span class="player-counter" id="playerCounter">1 / 12</span>
            <div class="player-nav-btns">
                <button class="player-nav-btn" id="playerPrevBtn" onclick="navigatePrevious()" aria-label="Previous">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
                <button class="player-nav-btn" id="playerNextBtn" onclick="navigateNext()" aria-label="Next">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
                </button>
            </div>
        </div>

        <!-- Podbean embed (expanded view) -->
        <div class="player-embed">
            <div id="playerContainer"></div>
        </div>

    <script>
    // ==========================================
    // TRANSLATIONS
    // ==========================================
    const translations = {
        en: {
            headerProgram: "Interreg Europe · Cycling Waterways",
            headerTitle: "Asteder — Gudenå Podcast Map",
            headerSubtitle: "Navigate through podcast episodes along the river",
            episodes: "Episodes",
            prev: "Prev",
            next: "Next",
            loading: "Loading map...",
            closePlayer: "Close player",
            episodeLabel: "Episode",
            noAudio: "Audio player not available"
        },
        da: {
            headerProgram: "Interreg Europe · Cycling Waterways",
            headerTitle: "Asteder — Gudenå Podcast Kort",
            headerSubtitle: "Naviger gennem podcast episoder langs floden",
            episodes: "Episoder",
            prev: "Forrige",
            next: "Næste",
            loading: "Indlæser kort...",
            closePlayer: "Luk afspiller",
            episodeLabel: "Episode",
            noAudio: "Lydafspiller ikke tilgængelig"
        }
    };

    // ==========================================
    // STATE
    // ==========================================
    let currentLanguage = localStorage.getItem('asteder_language') || 'en';
    let allEpisodes = [];
    let currentEpisodeIndex = -1;
    let playerExpanded = false;

    // ==========================================
    // LANGUAGE SWITCHING
    // ==========================================
    function setLanguage(lang) {
        currentLanguage = lang;
        localStorage.setItem('asteder_language', lang);

        document.querySelectorAll('.lang-flag').forEach(f => {
            f.classList.toggle('active', f.dataset.lang === lang);
        });

        const t = translations[lang];
        document.getElementById('headerTitle').textContent = t.headerTitle;
        document.getElementById('headerProgram').textContent = t.headerProgram;
        document.getElementById('headerSubtitle').textContent = t.headerSubtitle;
        document.getElementById('sidebarHeader').textContent = t.episodes;
        document.getElementById('prevLabel').textContent = t.prev;
        document.getElementById('nextLabel').textContent = t.next;
        document.getElementById('loadingText').textContent = t.loading;

        // Refresh sidebar if episodes loaded
        if (allEpisodes.length > 0) refreshSidebar();
    }

    // ==========================================
    // SIDEBAR
    // ==========================================
    function refreshSidebar() {
        const list = document.getElementById('episodeList');
        const t = translations[currentLanguage];
        list.innerHTML = '';

        allEpisodes.forEach((feature, index) => {
            const attrs = feature.attributes;
            const episodeNum = attrs.id || (index + 1);
            const fullName = attrs.name || `${t.episodeLabel} ${episodeNum}`;
            const displayName = fullName.split('(#')[0].trim();

            const div = document.createElement('div');
            div.className = 'episode-item' + (index === currentEpisodeIndex ? ' active' : '');
            div.dataset.index = index;
            div.innerHTML = `
                <span class="episode-number">${t.episodeLabel} ${episodeNum}</span>
                <span class="episode-name">${displayName}</span>
            `;
            div.onclick = () => selectEpisode(index);
            list.appendChild(div);
        });
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const isOpen = sidebar.classList.toggle('open');
        overlay.classList.toggle('visible', isOpen);
    }

    // ==========================================
    // PLAYER EXPAND/COLLAPSE
    // ==========================================
    function togglePlayerExpand() {
        const panel = document.getElementById('audioPanel');
        playerExpanded = !playerExpanded;
        panel.classList.toggle('expanded', playerExpanded);
        document.body.classList.toggle('player-expanded', playerExpanded);
    }

    function expandPlayer() {
        if (!playerExpanded) togglePlayerExpand();
    }

    // ==========================================
    // EPISODE SELECTION
    // ==========================================
    function selectEpisode(index) {
        if (index < 0 || index >= allEpisodes.length) return;

        currentEpisodeIndex = index;
        const feature = allEpisodes[index];
        const attrs = feature.attributes;

        // Update sidebar
        document.querySelectorAll('.episode-item').forEach((item, i) => {
            item.classList.toggle('active', i === index);
            if (i === index) item.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });

        // Update sidebar nav buttons
        document.getElementById('prevBtn').disabled = (index === 0);
        document.getElementById('nextBtn').disabled = (index === allEpisodes.length - 1);

        // Close sidebar on mobile
        if (window.innerWidth <= 1024) {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
        }

        // Show player
        showAudioPlayer(attrs);

        // Show tooltip
        showEpisodeTooltip(feature, attrs);

        // Zoom
        if (window.mapView) {
            window.mapView.goTo({ target: feature.geometry, zoom: 11 }, { duration: 800 });
        }

        // Highlight
        if (window.highlightHandle) window.highlightHandle.remove();
        if (window.mapView && window.interpretationLayer) {
            window.mapView.whenLayerView(window.interpretationLayer).then(lv => {
                window.highlightHandle = lv.highlight(feature);
            });
        }
    }

    function showAudioPlayer(attrs) {
        const panel = document.getElementById('audioPanel');
        const titleEl = document.getElementById('episodeTitle');
        const downloadsEl = document.getElementById('episodeDownloads');
        const playerContainer = document.getElementById('playerContainer');
        const t = translations[currentLanguage];

        // Title
        const fullName = attrs.name || 'Unknown Episode';
        titleEl.textContent = fullName.split('(#')[0].trim();

        // Downloads
        downloadsEl.textContent = attrs.downloads ? `${attrs.downloads} downloads` : '';

        // Counter
        document.getElementById('playerCounter').textContent = `${currentEpisodeIndex + 1} / ${allEpisodes.length}`;

        // Nav buttons in player
        document.getElementById('playerPrevBtn').disabled = (currentEpisodeIndex === 0);
        document.getElementById('playerNextBtn').disabled = (currentEpisodeIndex === allEpisodes.length - 1);

        // Podbean embed
        const shareLink = attrs.link;
        if (shareLink) {
            const episodeId = shareLink.split('/').pop().replace('pb-', '');
            const embedUrl = `https://www.podbean.com/player-v2/?from=embed&i=${episodeId}-pb&square=1&share=1&download=1&fonts=Arial&skin=1&font-color=auto&btn-skin=7&size=300`;
            playerContainer.innerHTML = `
                <iframe title="${fullName}" allowtransparency="true"
                    height="180" width="100%"
                    style="border: none; min-width: min(100%, 430px); border-radius: var(--radius-sm);"
                    scrolling="no" src="${embedUrl}" loading="lazy" allowfullscreen="">
                </iframe>`;
        } else {
            playerContainer.innerHTML = `<p style="color: var(--color-text-secondary); padding: 20px; text-align: center;">${t.noAudio}</p>`;
        }

        // Show and auto-expand
        panel.classList.add('visible');
        document.body.classList.add('player-open');
        if (!playerExpanded) {
            // Auto-expand after a short delay so the user sees the compact bar first
            setTimeout(() => expandPlayer(), 300);
        }
    }

    function showEpisodeTooltip(feature, attrs) {
        if (!window.tooltipLayer || !window.Graphic) return;
        window.tooltipLayer.removeAll();

        const fullName = attrs.name || 'Unknown Episode';
        let displayName = fullName.split('(#')[0].trim().replace(/^Podcast\.\s*/i, '');

        const textGraphic = new window.Graphic({
            geometry: feature.geometry,
            symbol: {
                type: 'text',
                color: '#1B3A2D',
                text: displayName,
                font: { size: 11, weight: 'bold', family: 'Source Sans 3, sans-serif' },
                haloColor: 'white',
                haloSize: 2,
                yoffset: -25
            }
        });
        window.tooltipLayer.add(textGraphic);
    }

    function closePlayer() {
        const panel = document.getElementById('audioPanel');
        panel.classList.remove('visible', 'expanded');
        playerExpanded = false;
        document.body.classList.remove('player-open', 'player-expanded');

        // Stop audio by clearing iframe
        document.getElementById('playerContainer').innerHTML = '';

        if (window.tooltipLayer) window.tooltipLayer.removeAll();
        if (window.highlightHandle) {
            window.highlightHandle.remove();
            window.highlightHandle = null;
        }

        document.querySelectorAll('.episode-item').forEach(item => item.classList.remove('active'));
        currentEpisodeIndex = -1;

        // Zoom out
        if (window.interpretationLayer && window.mapView) {
            const q = window.interpretationLayer.createQuery();
            q.where = '1=1';
            window.interpretationLayer.queryExtent(q).then(result => {
                if (result.extent) window.mapView.goTo(result.extent.expand(1.1), { duration: 600 });
            });
        }
    }

    function navigatePrevious() {
        if (currentEpisodeIndex > 0) selectEpisode(currentEpisodeIndex - 1);
    }

    function navigateNext() {
        if (currentEpisodeIndex < allEpisodes.length - 1) selectEpisode(currentEpisodeIndex + 1);
    }

    // ==========================================
    // INIT
    // ==========================================
    window.addEventListener('DOMContentLoaded', () => setLanguage(currentLanguage));

    // ==========================================
    // ARCGIS MAP
    // ==========================================
    require([
        "esri/WebMap",
        "esri/views/MapView",
        "esri/widgets/Legend",
        "esri/widgets/ScaleBar",
        "esri/widgets/Expand",
        "esri/Graphic",
        "esri/layers/GraphicsLayer"
    ], function(WebMap, MapView, Legend, ScaleBar, Expand, Graphic, GraphicsLayer) {

        window.Graphic = Graphic;

        const webmap = new WebMap({
            portalItem: { id: "28cbdfd16ee14463b5e537e734c63b4f" }
        });

        const view = new MapView({
            container: "viewDiv",
            map: webmap,
            constraints: { minZoom: 8, maxZoom: 16 }
        });

        window.mapView = view;
        window.highlightHandle = null;

        view.when(() => {
            // Fade out loading
            const loadingEl = document.getElementById('loading');
            loadingEl.classList.add('hidden');
            setTimeout(() => loadingEl.style.display = 'none', 600);

            // Tooltip layer
            const tooltipLayer = new GraphicsLayer();
            webmap.add(tooltipLayer);
            window.tooltipLayer = tooltipLayer;

            // Find podcast layer
            let interpretationLayer = null;
            webmap.layers.forEach(layer => {
                if (layer.title && layer.title.toLowerCase().includes('podcast')) {
                    interpretationLayer = layer;
                }
            });
            window.interpretationLayer = interpretationLayer;

            if (interpretationLayer) loadEpisodes(interpretationLayer);

            // Legend (desktop/tablet only)
            if (window.innerWidth > 768) {
                const legend = new Legend({ view, style: 'card' });
                const legendExpand = new Expand({
                    view, content: legend, expanded: false,
                    expandIconClass: 'esri-icon-layer-list',
                    expandTooltip: 'Legend'
                });
                view.ui.add(legendExpand, 'top-right');
            }

            // Scale bar
            view.ui.add(new ScaleBar({ view, unit: 'metric' }), 'bottom-left');
        });

        // Click handler
        view.on('click', event => {
            view.hitTest(event).then(response => {
                if (response.results.length === 0) return;
                const graphic = response.results[0].graphic;
                if (graphic.layer !== window.interpretationLayer) return;

                const clickedFid = graphic.attributes.fid || graphic.attributes.FID || graphic.attributes.OBJECTID;
                const idx = allEpisodes.findIndex(f => {
                    const fid = f.attributes.fid || f.attributes.FID || f.attributes.OBJECTID;
                    return fid === clickedFid;
                });
                if (idx !== -1) selectEpisode(idx);
            });
        });

        // Hover cursor
        view.on('pointer-move', event => {
            view.hitTest(event).then(response => {
                const hit = response.results.length > 0 && response.results[0].graphic.layer === window.interpretationLayer;
                view.container.style.cursor = hit ? 'pointer' : 'default';
            });
        });

        function loadEpisodes(layer) {
            const query = layer.createQuery();
            query.where = '1=1';
            query.outFields = ['*'];
            query.orderByFields = ['id ASC'];

            layer.queryFeatures(query).then(result => {
                allEpisodes = result.features;
                refreshSidebar();
                if (allEpisodes.length > 0) selectEpisode(0);
            });
        }
    });
    </script>
</body>
</html>
